<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigPlanetarium | Jupiter</title>

    <style>
        body {
            background: #050816;
            color: #f8fafc;
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
        }

        .site-header {
            background: #020617;
            padding: 15px 20px;
        }

        .navbar {
            max-width: 1100px;
            margin: auto;
            display: flex;
            justify-content: space-between;
        }

        .logo {
            color: white;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: #38bdf8;
            text-decoration: none;
        }

        .nav-links a.active {
            background: #38bdf8;
            color: black;
            padding: 8px 12px;
            border-radius: 20px;
        }

        .content-section {
            max-width: 1100px;
            margin: auto;
            padding: 60px 20px;
        }

        img {
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        button {
            background: #38bdf8;
            color: black;
            border: none;
            border-radius: 25px;
            padding: 12px 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .fact-output {
            color: #facc15;
            font-weight: bold;
            margin-top: 15px;
        }

        footer {
            background: #020617;
            text-align: center;
            padding: 25px;
        }
    </style>
</head>

<body>

<header class="site-header">
    <nav class="navbar">
        <a href="index.html" class="logo">BigPlanetarium</a>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="planets.html">Planets</a></li>
            <li><a href="mars.html">Mars</a></li>
            <li><a href="jupiter.html" class="active">Jupiter</a></li>
            <li><a href="gallery.html">Gallery</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="content-section">
        <h1>Jupiter</h1>

        <img src="images/jupiter.jpg" alt="Jupiter planet">

        <p>
            Jupiter is the largest planet in our Solar System. It is a gas giant
            made mostly of hydrogen and helium and has very strong storms.
        </p>

        <button id="jupiterFactButton">Show Jupiter fact</button>

        <p id="jupiterFactOutput" class="fact-output"></p>
    </section>
</main>

<footer>
    <p>© 2026 BigPlanetarium</p>
</footer>

<script>
    const jupiterButton = document.getElementById("jupiterFactButton");
    const jupiterOutput = document.getElementById("jupiterFactOutput");

    jupiterButton.addEventListener("click", function () {
        jupiterOutput.textContent = "Jupiter has the Great Red Spot, a giant storm bigger than Earth.";
    });
</script>

</body>
</html>
