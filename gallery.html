<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigPlanetarium | Gallery</title>

    <style>
        body {
            background: #050816;
            color: #f8fafc;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .site-header {
            background: #020617;
            padding: 15px 20px;
        }

        .navbar {
            max-width: 1100px;
            margin: auto;
            display: flex;
            justify-content: space-between;
        }

        .logo {
            color: white;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: #38bdf8;
            text-decoration: none;
        }

        .nav-links a.active {
            background: #38bdf8;
            color: black;
            padding: 8px 12px;
            border-radius: 20px;
        }

        .content-section {
            max-width: 1100px;
            margin: auto;
            padding: 60px 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        img {
            width: 100%;
            border-radius: 15px;
        }

        footer {
            background: #020617;
            text-align: center;
            padding: 25px;
        }
    </style>
</head>

<body>

<header class="site-header">
    <nav class="navbar">
        <a href="index.html" class="logo">BigPlanetarium</a>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="planets.html">Planets</a></li>
            <li><a href="mars.html">Mars</a></li>
            <li><a href="jupiter.html">Jupiter</a></li>
            <li><a href="gallery.html" class="active">Gallery</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="content-section">
        <h1>Space Gallery</h1>

       <div class="gallery">

    <img src="images/milky-way.jpg" alt="Milky Way galaxy">

    <img src="images/mars.jpg" alt="Mars planet">

    <img src="images/jupiter.jpg" alt="Jupiter planet">

    <img src="images/saturn.jpg" alt="Saturn planet with rings">

</div>
    </section>
</main>

<footer>
    <p>© 2026 BigPlanetarium</p>
</footer>

</body>
</html>
